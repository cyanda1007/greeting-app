<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Greeting App</h1>

      <div class="message"></div>

      <form>
        <div class="display">
          <div class="input">
            <label for="name" class="name-error">Please enter a name</label>
            <label for="name" class="duplicate"
              >Name has already been greeted</label
            >

            <input
              type="text"
              class="languageEntered"
              placeholder="enter a name"
              name="name"
            />
          </div>

          <div class="count">0</div>
        </div>
        <input
          type="radio"
          name="language"
          class="radioZulu"
          value="zulu"
        />Isizulu
        <input
          type="radio"
          name="language"
          class="radioEnglish"
          value="engfa"
        />English
        <input type="radio" name="language" class="radioXhosa" value="xhosa" />
        Isixhosa
        <div class="filter">
          <label for="language" class="language-error"
            >Please select one language</label
          >
          <strong>Filter by language</strong>
        </div>
        <div class="btn">
          <button class="addLanguage">Greet</button>
          <button class="remove">Reset</button>
        </div>
      </form>

      <hr />
      <div class="typeOfLanguage"></div>
    </div>
    <script src="./greeting.js"></script>
    <script src="./greeting.dom.js"></script>
  </body>
</html>

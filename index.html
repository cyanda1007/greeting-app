<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div>
        <h1>Greeting App</h1>

        <div class="message"></div>

        <form>
          <input
            type="text"
            class="languageEntered"
            placeholder="enter a name"
          />
          <span class="count"></span>
          <button class="addLanguage">Greet</button>
          <button class="remove">Reset</button>
        </form>

        <div class="filter">
          <strong>Filter by language</strong>

          <input
            type="radio"
            name="language"
            class="radioZulu"
            value="zulu"
          />Isizulu
          <input
            type="radio"
            name="language"
            class="radioEnglish"
            value="engfa"
          />English
          <input
            type="radio"
            name="language"
            class="radioXhosa"
            value="xhosa"
          />
          Isixhosa
        </div>
        <hr />
        <div class="typeOfLanguage"></div>
      </div>
    </div>
    <script src="./greeting.js"></script>
    <script src="./greeting.dom.js"></script>
  </body>
</html>
